name: Lint & Format Code

on:
  workflow_dispatch: ~
  push:
    paths:
      - "**/*.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/check_code.yml"
    branches:
      - "master"
  pull_request:
    paths:
      - "**/*.js"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/check_code.yml"

jobs:
  Check-Code:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Read Node.js version
        id: node-version
        shell: bash
        run: echo "version=$(node -p \"require('./package.json').engines.node\")" >> "$GITHUB_OUTPUT"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.node-version.outputs.version }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Check format
        run: pnpm test
