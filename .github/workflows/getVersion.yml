name: coupons # yml文件名
 
on:
  push:
    branches:
      - master
  schedule:   
    - cron: '1-10 11 * * 1' # 每周一上午11点1分到11点10分运行
    - cron: '* */2 * * *'   # 每两小时运行一次
 
jobs:
  get-Game-Version: # 任务名
    runs-on: ubuntu-latest
    steps:
        - name: Checkout code
          uses: actions/checkout@v3
          with:
            fetch-depth: 0
        - name: Install Node.js
          uses: actions/setup-node@v3
          with:
            node-version: 14
        - name: Install dependencies
          run: npm install
        - name: Extract branch name
          shell: bash
          run: echo "branch=${GITHUB_HEAD_REF:-${GITHUB_REF#refs/heads/}}" >> $GITHUB_OUTPUT
          id: extract_branch
        - name: Check CN Game Update
          run: node ./Scripts/getWinGameVersion.js cn
        - name: Check OS Game Update
          run: node ./Scripts/getWinGameVersion.js os
        - run: git config --global user.name "github-actions"
        - run: git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
        - run: git checkout -- package-lock.json
        - run: git stash
        - run: git checkout ${{ steps.extract_branch.outputs.branch }} && git pull
        - run: git stash pop || true

        - name: Commit code changes
          run: "git add -u && git commit -m 'docs: update game version [skip ci]' || true"
        - name: Push code changes
          run: git push --set-upstream --force origin ${{ steps.extract_branch.outputs.branch }}
